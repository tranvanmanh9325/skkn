# KHÔNG BAO GIỜ commit file .env lên Git
# Mỗi developer tự tạo .env từ skkn-api-main/.env.example

version: "3.9"

# ---------------------------------------------------------------------------
# Named volumes — dữ liệu được persist ngay cả khi container bị xóa
# ---------------------------------------------------------------------------
volumes:
  mongo_data:
  redis_data:
  next_cache:

# ---------------------------------------------------------------------------
# Networks — isolate traffic nội bộ, chỉ expose những gì cần ra ngoài
# ---------------------------------------------------------------------------
networks:
  skkn_net:
    driver: bridge

services:
  # =========================================================================
  # MongoDB
  # =========================================================================
  mongo:
    image: mongo:latest
    container_name: skkn_mongo
    restart: unless-stopped
    networks:
      - skkn_net
    volumes:
      - mongo_data:/data/db
    # Biến môi trường đọc từ .env của backend (không hardcode credential)
    env_file:
      - ./skkn-api-main/.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "090325"
    # Healthcheck: mongosh ping vào admin DB để xác nhận server đã accept connections
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "admin",
          "--password",
          "090325",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping').ok",
          "--eval",
          "quit(db.adminCommand('ping').ok ? 0 : 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================================================================
  # Redis
  # =========================================================================
  redis:
    image: redis:alpine
    container_name: skkn_redis
    restart: unless-stopped
    networks:
      - skkn_net
    volumes:
      - redis_data:/data
    # Bật password protection mong muốn: 090325
    command: ["redis-server", "--requirepass", "090325", "--appendonly", "yes"]
    env_file:
      - ./skkn-api-main/.env
    # Healthcheck: redis-cli ping với password để xác nhận server đang chấp nhận lệnh
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "090325", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  # Backend (Node.js / TypeScript API)
  # =========================================================================
  backend:
    build:
      context: ./skkn-api-main
      dockerfile: Dockerfile
      # Target "development" stage — cài đủ devDependencies, chạy nodemon/tsx
      target: development
    container_name: skkn_backend
    restart: unless-stopped
    networks:
      - skkn_net
    ports:
      - "5001:5001"
    env_file:
      - ./skkn-api-main/.env
    volumes:
      # Bind mount toàn bộ source từ host vào container để hot-reload hoạt động
      - ./skkn-api-main:/app
      # Anonymous volume "che" /app/node_modules — ngăn host overwrite node_modules
      # đã được cài TRONG container (tránh lỗi platform binary mismatch trên Windows/Mac)
      - /app/node_modules
    # Ghi đè CMD của Dockerfile: chạy seed trước, sau đó mới start dev server.
    # Dùng && để nếu seed lỗi (VD: sai MONGO_URI) thì server không start — fail fast.
    # sh -c cần thiết vì Docker CMD dạng array không hỗ trợ shell operators (&&).
    command: sh -c "npm run seed && npm run dev"
    # depends_on với condition: service_healthy đảm bảo backend chỉ start
    # SAU KHI cả Mongo và Redis đã pass healthcheck — tránh race condition
    # "Connection refused" khi DB chưa kịp sẵn sàng nhận kết nối.
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =========================================================================
  # Frontend (Next.js)
  # =========================================================================
  skkn_frontend:
    build:
      context: ./skkn-client
      dockerfile: Dockerfile
    container_name: skkn_frontend
    restart: unless-stopped
    networks:
      - skkn_net
    ports:
      # Host 5002 → Container 3000 (Next.js default)
      - "5002:3000"
    environment:
      # Bắt buộc trên Windows/Mac: kích hoạt polling để Webpack/Watchpack
      # nhận thấy file changes khi dùng bind mount qua Docker Desktop VM layer.
      WATCHPACK_POLLING: "true"
      # NEXT_PUBLIC_* được nhúng vào bundle phía client lúc build.
      # localhost:5001 resolve đúng từ browser vì port đã được map ra host.
      # Lưu ý: nếu cần gọi backend từ server-side (RSC/Route Handlers),
      # dùng biến riêng trỏ đến service name: http://backend:5001
      NEXT_PUBLIC_API_URL: http://localhost:5001
    volumes:
      # Bind mount: mọi thay đổi source từ host → container ngay lập tức (hot-reload)
      - ./skkn-client:/app
      # Anonymous volume che /app/node_modules — ngăn host overwrite node_modules
      # đã cài trong container (tránh binary mismatch giữa Windows host và Linux container)
      - /app/node_modules
      # Named volume cho .next build cache — tách riêng để tránh conflict
      # giữa local build (Windows) và container build (Linux)
      - next_cache:/app/.next
